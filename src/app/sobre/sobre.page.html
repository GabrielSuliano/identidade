<ion-header [translucent]="true">
  <ion-toolbar class="topo-toolbar">
    <ion-title>Sobre o Trabalho</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="pagina-sobre">
  <div class="conteudo-sobre ion-padding">
    <section class="hero-sobre">
      <p class="etiqueta">Tela 2</p>
      <h1>{{ nomeCompleto }}</h1>
      <p class="texto-abertura">{{ textoSobreMim }}</p>
    </section>

    <ion-card class="card-destaque">
      <ion-card-header>
        <ion-card-title>Sobre a disciplina</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <p>{{ textoDisciplina }}</p>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" size="large" routerLink="/home" class="botao-voltar">
      Voltar para a tela inicial
    </ion-button>
  </div>
</ion-content>
