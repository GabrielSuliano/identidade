<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Tela 1 - Cartão de Identificação</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="pagina-identificacao">
    <ion-card class="cartao-identificacao">
      <div class="faixa-topo">
        <p class="instituicao">CENTRO UNIVERSITÁRIO AUGUSTO MOTTA</p>
        <p class="tipo-cartao">CARTÃO DIGITAL DO ALUNO</p>
      </div>

      <ion-card-content>
        <div class="bloco-principal">
          <img src="assets/foto-gabriel.jpeg" alt="Foto do aluno" class="foto-aluno" />

          <div class="dados-aluno">
            <h1>{{ nomeCompleto }}</h1>
            <p><strong>Matrícula:</strong> {{ matricula }}</p>
            <p><strong>Curso:</strong> {{ curso }}</p>
          </div>
        </div>

        <ion-list lines="full" class="lista-dados">
          <ion-item>
            <ion-label>
              <h2>Turma</h2>
              <p>{{ turma }}</p>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-label>
              <h2>Unidade</h2>
              <p>{{ unidade }}</p>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-label>
              <h2>Turno</h2>
              <p>{{ turno }}</p>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-label>
              <h2>Módulo</h2>
              <p>{{ modulo }}</p>
            </ion-label>
          </ion-item>
        </ion-list>

        <ion-button expand="block" size="large" routerLink="/sobre" color="primary">
          Ir para a Tela 2 (Sobre)
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
